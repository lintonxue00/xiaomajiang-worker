name = "xiaomajiang-worker"
main = "./src/index.js"
compatibility_date = "2026-03-18"

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "accounts_db"
database_id = "00000000-0000-0000-0000-000000000000"

